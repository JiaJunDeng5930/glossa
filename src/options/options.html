<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Glossa 设置</title>
    <link rel="stylesheet" href="../assets/options.css">
  </head>
  <body>
    <main>
      <header class="page-hero">
        <p>Glossa</p>
        <h1>阅读设置</h1>
      </header>
      <form id="settings-form">
        <section class="settings-card" aria-labelledby="reading-heading">
          <h2 id="reading-heading">阅读</h2>
          <div class="field-grid">
            <label>
              选词快捷键
              <input name="shortcutKey" type="hidden">
              <button id="shortcut-capture" class="secondary" type="button"></button>
            </label>
            <label>
              学习窗口天数
              <input name="learningWindowDays" type="number" min="1" step="1">
            </label>
            <label>
              基础过滤词表
              <select name="knownWordList"></select>
            </label>
          </div>
        </section>
        <section class="settings-card" aria-labelledby="appearance-heading">
          <h2 id="appearance-heading">释义样式</h2>
          <div class="style-grid">
            <label>
              文字颜色
              <input name="glossTextColor" type="color">
            </label>
            <label>
              背景颜色
              <input name="glossBackgroundColor" type="color">
            </label>
            <label>
              深浅
              <input name="glossBackgroundOpacity" type="range" min="0.2" max="1" step="0.05">
            </label>
            <label>
              字体
              <select name="glossFontFamily">
                <option value="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">系统无衬线</option>
                <option value="Georgia, Times New Roman, serif">衬线</option>
                <option value="Inter, ui-sans-serif, system-ui, sans-serif">Inter</option>
                <option value="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">等宽</option>
              </select>
            </label>
            <label>
              字号
              <input name="glossFontSize" type="number" min="9" max="24" step="1">
            </label>
          </div>
          <div id="gloss-preview" class="gloss-preview">
            读者可以
            <span class="preview-word">
              <strong class="preview-gloss">适应</strong>
              <span>adapt</span>
            </span>
            并理解
            <span class="preview-word">
              <strong class="preview-gloss">复杂</strong>
              <span>complex</span>
            </span>
            的观点。
          </div>
        </section>
        <div class="settings-grid">
          <section class="settings-card" aria-labelledby="ai-heading">
            <h2 id="ai-heading">AI</h2>
            <label>
              AI 服务
              <select name="provider">
                <option value="openai-responses">OpenAI Responses API</option>
                <option value="openai-chat-completions">OpenAI Chat Completions API</option>
                <option value="openai-completions">OpenAI Completions API</option>
                <option value="glossa-backend">Glossa 后端</option>
              </select>
            </label>
            <label>
              AI 接口地址
              <input name="aiEndpoint" autocomplete="off">
            </label>
            <label>
              AI API 密钥
              <input name="apiKey" type="password" autocomplete="off">
            </label>
            <label>
              模型
              <input name="modelVersion" autocomplete="off">
            </label>
            <label>
              推理强度
              <select name="reasoningEffort">
                <option value="none">无</option>
                <option value="minimal">极简</option>
                <option value="low">低</option>
                <option value="medium">中</option>
                <option value="high">高</option>
                <option value="xhigh">超高</option>
              </select>
            </label>
            <button id="test-ai" class="test-button" type="button" data-state="idle" aria-label="测试 AI">
              <span class="test-label">测试 AI</span>
              <span class="test-spinner" aria-hidden="true"></span>
              <svg class="test-icon test-icon-success" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M20 6 9 17l-5-5"/>
              </svg>
              <svg class="test-icon test-icon-error" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 8v5M12 17h.01M10.3 4.5 2.7 18a2 2 0 0 0 1.7 3h15.2a2 2 0 0 0 1.7-3L13.7 4.5a2 2 0 0 0-3.4 0Z"/>
              </svg>
            </button>
          </section>
          <section class="settings-card" aria-labelledby="anki-heading">
            <h2 id="anki-heading">Anki</h2>
            <label>
              AnkiConnect 接口地址
              <input name="ankiEndpoint" autocomplete="off">
            </label>
            <label>
              Anki 牌组
              <input name="ankiDeck" autocomplete="off">
            </label>
            <button id="test-anki" class="test-button" type="button" data-state="idle" aria-label="测试 Anki">
              <span class="test-label">测试 Anki</span>
              <span class="test-spinner" aria-hidden="true"></span>
              <svg class="test-icon test-icon-success" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M20 6 9 17l-5-5"/>
              </svg>
              <svg class="test-icon test-icon-error" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 8v5M12 17h.01M10.3 4.5 2.7 18a2 2 0 0 0 1.7 3h15.2a2 2 0 0 0 1.7-3L13.7 4.5a2 2 0 0 0-3.4 0Z"/>
              </svg>
            </button>
          </section>
        </div>
        <section class="settings-card" aria-labelledby="prompt-heading">
          <h2 id="prompt-heading">提示词</h2>
          <label>
            释义提示词
            <textarea name="glossPrompt" rows="5"></textarea>
          </label>
          <label>
            Anki 卡片提示词
            <textarea name="ankiPrompt" rows="5"></textarea>
          </label>
        </section>
        <div class="actions">
          <button class="primary-action" type="submit">保存</button>
        </div>
      </form>
      <output id="status" role="status"></output>
    </main>
    <script type="module" src="../options.js"></script>
  </body>
</html>
