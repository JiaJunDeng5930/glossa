<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Glossa 设置</title>
    <link rel="stylesheet" href="../assets/theme.css">
    <link rel="stylesheet" href="../assets/options.css">
  </head>
  <body>
    <main class="settings-shell">
      <aside class="settings-rail" aria-label="设置导航">
        <div class="brand-block">
          <img class="brand-logo" src="../assets/logo.png" alt="Glossa">
          <span>阅读 · 释义 · 记忆</span>
        </div>
        <nav class="section-nav">
          <a href="#reading-section">阅读</a>
          <a href="#known-words-section">已掌握词汇</a>
          <a href="#appearance-section">释义样式</a>
          <a href="#ai-section">AI</a>
          <a href="#anki-section">Anki</a>
          <a href="#prompt-section">提示词</a>
          <a href="#cache-section">缓存</a>
        </nav>
      </aside>

      <section class="settings-workspace">
        <header class="workspace-header">
          <div>
            <p class="document-label">Chrome 扩展设置</p>
            <h1>阅读设置</h1>
          </div>
          <div class="header-actions">
            <output id="status" role="status"></output>
            <button id="save-settings" class="primary-action" type="submit" form="settings-form" data-state="clean">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/>
                <path d="M17 21v-8H7v8M7 3v5h8"/>
              </svg>
              <span class="save-label">保存</span>
            </button>
          </div>
        </header>

        <form id="settings-form" class="settings-form">
          <section id="reading-section" class="settings-panel" aria-labelledby="reading-heading">
            <div class="panel-heading">
              <p>01</p>
              <h2 id="reading-heading">阅读</h2>
            </div>
            <div class="field-grid">
              <label>
                选词快捷键
                <span class="field-help">按住这个快捷键并点击页面单词来制卡。</span>
                <input name="shortcutKey" type="hidden">
                <button id="shortcut-capture" class="secondary" type="button"></button>
                <span id="shortcut-capture-error" class="field-help" role="status"></span>
              </label>
              <label>
                翻译快捷键
                <span class="field-help">在页面中按下这个快捷键来开启或关闭本页翻译。</span>
                <input name="translateShortcutKey" type="hidden">
                <button id="translate-shortcut-capture" class="secondary" type="button"></button>
                <span id="translate-shortcut-capture-error" class="field-help" role="status"></span>
              </label>
              <label class="switch-field">
                <span>
                  自动翻译
                  <small class="field-help">打开页面后自动开始扫描并显示释义。</small>
                </span>
                <input name="autoTranslateEnabled" type="checkbox">
              </label>
              <label>
                学习窗口天数
                <span class="field-help">点击制卡后的词会在这段时间内继续显示释义。</span>
                <input name="learningWindowDays" type="number" min="1" step="1">
              </label>
              <label class="wide-field">
                基础过滤词表
                <span class="field-help">词表内的基础词会在页面扫描时跳过。</span>
                <select name="knownWordList"></select>
              </label>
            </div>
            <a class="setup-link" href="../onboarding/onboarding.html" target="_blank">重新打开首次设置</a>
          </section>

          <section id="known-words-section" class="settings-panel compact-panel" aria-labelledby="known-words-heading">
            <div class="panel-heading">
              <p>02</p>
              <h2 id="known-words-heading">已掌握词汇</h2>
            </div>
            <div class="summary-row">
              <p id="known-words-summary" class="field-help">正在读取已掌握词汇。</p>
              <button id="open-known-words" class="secondary" type="button">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M4 5h16M4 12h16M4 19h16"/>
                  <path d="M8 5v14"/>
                </svg>
                管理词汇
              </button>
            </div>
          </section>

          <section id="appearance-section" class="settings-panel" aria-labelledby="appearance-heading">
            <div class="panel-heading">
              <p>03</p>
              <h2 id="appearance-heading">释义样式</h2>
            </div>
            <div class="appearance-layout">
              <div class="style-grid">
                <label>
                  文字颜色
                  <span class="field-help">控制释义标签中的文字颜色。</span>
                  <input name="glossTextColor" type="color">
                </label>
                <label>
                  背景颜色
                  <span class="field-help">控制普通释义标签的背景颜色。</span>
                  <input name="glossBackgroundColor" type="color">
                </label>
                <label>
                  制卡成功背景
                  <span class="field-help">控制制卡成功反馈的背景颜色。</span>
                  <input name="cardSuccessBackgroundColor" type="color">
                </label>
                <label>
                  制卡失败背景
                  <span class="field-help">控制制卡失败反馈的背景颜色。</span>
                  <input name="cardErrorBackgroundColor" type="color">
                </label>
                <label>
                  <span class="field-heading">
                    <span>深浅</span>
                    <output id="gloss-background-opacity-value" for="gloss-background-opacity">94%</output>
                  </span>
                  <span class="field-help">控制释义和反馈标签的背景透明度。</span>
                  <input id="gloss-background-opacity" name="glossBackgroundOpacity" type="range" min="0.2" max="1" step="0.05">
                </label>
                <label>
                  字体
                  <span class="field-help">控制释义标签和预览的字体。</span>
                  <select name="glossFontFamily">
                    <option value="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">系统无衬线</option>
                    <option value="Georgia, Times New Roman, serif">衬线</option>
                    <option value="Inter, ui-sans-serif, system-ui, sans-serif">Inter</option>
                    <option value="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">等宽</option>
                  </select>
                </label>
                <label>
                  字号
                  <span class="field-help">控制释义标签的文字大小。</span>
                  <input name="glossFontSize" type="number" min="9" max="24" step="1">
                </label>
              </div>
              <div id="gloss-preview" class="gloss-preview" aria-label="释义样式预览">
                <p>
                  The reader can
                  <span class="preview-word">
                    <strong class="preview-gloss">适应</strong>
                    <span>adapt</span>
                  </span>
                  and understand
                  <span class="preview-word">
                    <strong class="preview-gloss preview-gloss-success">复杂</strong>
                    <span>complex</span>
                  </span>
                  ideas while a failed request marks
                  <span class="preview-word">
                    <strong class="preview-gloss preview-gloss-error">×</strong>
                    <span>failed</span>
                  </span>
                  in place.
                </p>
              </div>
            </div>
          </section>

          <div class="settings-grid">
            <section id="ai-section" class="settings-panel" aria-labelledby="ai-heading">
              <div class="panel-heading">
                <p>04</p>
                <h2 id="ai-heading">AI</h2>
              </div>
              <label>
                AI 服务
                <span class="field-help">选择生成释义和卡片内容的服务类型。</span>
                <select name="provider">
                  <option value="openai-responses">OpenAI Responses API</option>
                  <option value="openai-chat-completions">OpenAI Chat Completions API</option>
                  <option value="openai-completions">OpenAI Completions API</option>
                  <option value="glossa-backend">Glossa 后端</option>
                </select>
              </label>
              <label>
                AI 接口地址
                <span class="field-help">发送 AI 请求的 HTTP 地址。</span>
                <input name="aiEndpoint" autocomplete="off">
              </label>
              <label data-ai-field="api-key">
                AI API 密钥
                <span class="field-help">发送 OpenAI 请求时使用的密钥。</span>
                <input name="apiKey" type="password" autocomplete="off">
              </label>
              <label>
                模型
                <span class="field-help">AI 请求体中的模型名称。</span>
                <input name="modelVersion" autocomplete="off">
              </label>
              <label data-ai-field="reasoning">
                推理强度
                <span class="field-help">控制支持推理参数的 AI 请求强度。</span>
                <select name="reasoningEffort">
                  <option value="none">无</option>
                  <option value="minimal">极简</option>
                  <option value="low">低</option>
                  <option value="medium">中</option>
                  <option value="high">高</option>
                  <option value="xhigh">超高</option>
                </select>
              </label>
              <label>
                AI 超时秒数
                <span class="field-help">单次 AI 请求等待响应的最长时间。</span>
                <input name="aiRequestTimeoutSeconds" type="number" min="1" step="1">
              </label>
              <button id="test-ai" class="test-button" type="button" data-state="idle" aria-label="测试 AI">
                <span class="test-label">测试 AI</span>
                <span class="test-spinner" aria-hidden="true"></span>
                <svg class="test-icon test-icon-success" aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M20 6 9 17l-5-5"/>
                </svg>
                <svg class="test-icon test-icon-error" aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M12 8v5M12 17h.01M10.3 4.5 2.7 18a2 2 0 0 0 1.7 3h15.2a2 2 0 0 0 1.7-3L13.7 4.5a2 2 0 0 0-3.4 0Z"/>
                </svg>
              </button>
              <output id="ai-status" class="inline-status" role="status"></output>
            </section>

            <section id="anki-section" class="settings-panel" aria-labelledby="anki-heading">
              <div class="panel-heading">
                <p>05</p>
                <h2 id="anki-heading">Anki</h2>
              </div>
              <label>
                AnkiConnect 接口地址
                <span class="field-help">发送 AnkiConnect 请求的本机地址。</span>
                <input name="ankiEndpoint" autocomplete="off">
              </label>
              <label>
                Anki 牌组
                <span class="field-help">新卡片写入的 Anki 牌组。</span>
                <select name="ankiDeck" disabled></select>
              </label>
              <label>
                Anki 卡片模板
                <span class="field-help">新卡片写入的模板，需要包含 Front 和 Back 字段。</span>
                <select name="ankiModelName" disabled></select>
              </label>
              <label>
                Anki 超时秒数
                <span class="field-help">单次 AnkiConnect 请求等待响应的最长时间。</span>
                <input name="ankiRequestTimeoutSeconds" type="number" min="1" step="1">
              </label>
              <label>
                重复制卡提示秒数
                <span class="field-help">已制卡词汇的确认提示在页面上停留的时间。</span>
                <input name="duplicatePromptSeconds" type="number" min="1" step="1">
              </label>
              <div class="anki-actions">
                <button id="refresh-anki" class="icon-button" type="button" data-state="idle" aria-label="刷新 Anki" title="刷新 Anki">
                  <span class="test-spinner" aria-hidden="true"></span>
                  <svg class="test-icon refresh-icon" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5"/>
                  </svg>
                </button>
                <button id="test-anki" class="test-button" type="button" data-state="idle" aria-label="测试 Anki">
                  <span class="test-label">测试 Anki</span>
                  <span class="test-spinner" aria-hidden="true"></span>
                  <svg class="test-icon test-icon-success" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M20 6 9 17l-5-5"/>
                  </svg>
                  <svg class="test-icon test-icon-error" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M12 8v5M12 17h.01M10.3 4.5 2.7 18a2 2 0 0 0 1.7 3h15.2a2 2 0 0 0 1.7-3L13.7 4.5a2 2 0 0 0-3.4 0Z"/>
                  </svg>
                </button>
              </div>
              <button id="reset-card-history" class="secondary danger-action" type="button">重置制卡记录</button>
              <output id="anki-status" class="inline-status" role="status"></output>
            </section>
          </div>

          <section id="prompt-section" class="settings-panel" aria-labelledby="prompt-heading">
            <div class="panel-heading">
              <p>06</p>
              <h2 id="prompt-heading">提示词</h2>
            </div>
            <label>
              <span class="field-heading">
                <span>释义提示词</span>
                <button id="reset-gloss-prompt" class="icon-button compact-icon-button" type="button" aria-label="重置释义提示词" title="重置释义提示词">
                  <svg class="test-icon reset-icon" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M3 12a9 9 0 1 0 3-6.7L3 8M3 3v5h5"/>
                  </svg>
                </button>
              </span>
              <span class="field-help">控制 AI 如何生成页面行内释义。</span>
              <textarea name="glossPrompt" rows="5"></textarea>
            </label>
            <label>
              <span class="field-heading">
                <span>Anki 卡片提示词</span>
                <button id="reset-anki-prompt" class="icon-button compact-icon-button" type="button" aria-label="重置 Anki 卡片提示词" title="重置 Anki 卡片提示词">
                  <svg class="test-icon reset-icon" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M3 12a9 9 0 1 0 3-6.7L3 8M3 3v5h5"/>
                  </svg>
                </button>
              </span>
              <span class="field-help">控制 AI 如何生成 Anki 卡片正反面。</span>
              <textarea name="ankiPrompt" rows="5"></textarea>
            </label>
          </section>

          <section id="cache-section" class="settings-panel compact-panel" aria-labelledby="cache-heading">
            <div class="panel-heading">
              <p>07</p>
              <h2 id="cache-heading">缓存</h2>
            </div>
            <div class="summary-row">
              <label>
                翻译缓存有效小时数
                <span class="field-help">缓存创建后在这段时间内优先用于页面释义。</span>
                <input name="glossCacheTtlHours" type="number" min="1" step="1">
              </label>
              <button id="clear-gloss-cache" class="secondary danger-action" type="button">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15"/>
                </svg>
                清空翻译缓存
              </button>
            </div>
          </section>
        </form>
      </section>

      <dialog id="known-words-dialog" class="known-words-dialog" aria-labelledby="known-words-dialog-heading">
        <div class="known-words-dialog-header">
          <div>
            <p class="dialog-kicker">Glossa 词汇纸夹</p>
            <h2 id="known-words-dialog-heading">已掌握词汇</h2>
          </div>
          <button id="close-known-words" class="icon-button" type="button" aria-label="关闭已掌握词汇" title="关闭已掌握词汇">
            <svg class="test-icon close-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <form id="known-word-form" class="known-word-tools">
          <label>
            添加词汇
            <span class="field-help">加入后，页面扫描会跳过这个词。</span>
            <input id="known-word-input" autocomplete="off">
          </label>
          <button id="add-known-word" class="secondary" type="submit">添加</button>
          <button id="clear-known-words" class="secondary danger-action" type="button">清空已掌握词汇</button>
          <output id="known-words-status" class="inline-status" role="status"></output>
        </form>
        <div class="known-words-browser">
          <nav id="known-words-nav" class="known-words-nav" aria-label="已掌握词汇字母索引"></nav>
          <div id="known-words-list" class="known-words-list" role="list"></div>
        </div>
      </dialog>
    </main>
    <script type="module" src="../options.js"></script>
  </body>
</html>
